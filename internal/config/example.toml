# MiSTer_GroovyRelay configuration.
# The bridge writes this file into data_dir on first run if it's missing.
# Edit bridge.mister.host at minimum, then restart the bridge.

[bridge]
data_dir = "/config" # Where device UUID + plex.tv auth token are stored

[bridge.video]
modeline = "NTSC_480i"            # NTSC_480i, NTSC_240p, PAL_576i (experimental), PAL_288p (experimental)
interlace_field_order = "bff"     # "tff" | "bff" — flip if you see shimmer on CRT
aspect_mode = "auto"              # "letterbox" | "zoom" | "auto"
rgb_mode = "rgb888"               # v1: rgb888 only (rgba8888 / rgb565 reserved for v2+)
lz4_enabled = true                # LZ4 block compression (recommended)

[bridge.audio]
sample_rate = 48000
channels = 2

[bridge.mister]
host = "192.168.1.50"             # MiSTer IP or hostname (required)
port = 32100                      # Groovy UDP port on the MiSTer (default 32100)
source_port = 32101               # Our stable source UDP port (kept across casts)
ssh_user = "root"                 # MiSTer's stock SSH user
ssh_password = "1"                # MiSTer's stock password. Change here if you've
                                  # hardened your MiSTer (or via the Settings UI).

[bridge.ui]
http_port = 32500                 # Bridge/UI HTTP port

# bridge.host_ip is the LAN IP this bridge advertises to Plex (/resources, plex.tv register).
# Leave it absent to auto-detect; set it explicitly on multi-NIC hosts where the
# Plex-facing NIC is not the default route.

[adapters.plex]
enabled = true
device_name = "MiSTer"            # Shown in Plex cast-target list
# device_uuid = ""                # Auto-generated on first run; persisted
profile_name = "Plex Home Theater"
# server_url = ""                 # Optional override; otherwise auto-discovered

[adapters.url]
enabled = false                   # Set to true (or use the UI toggle) to accept POST URL casts
ytdlp_enabled = true              # Master switch for yt-dlp resolution. When true,
                                  # auto mode routes URLs whose host matches ytdlp_hosts
                                  # through yt-dlp; mode=ytdlp forces it.
# ytdlp_hosts default is the curated list (youtube.com, twitch.tv, vimeo.com,
# archive.org, dailymotion.com, soundcloud.com, bandcamp.com, etc.). Override
# below to add more (e.g. tiktok.com, x.com — note these break frequently).
# ytdlp_hosts = ["youtube.com", "twitch.tv", "your-host.example"]
# ytdlp_format = "bv*[height<=720]+ba/bv*+ba/b"
# ytdlp_resolve_timeout_seconds = 30
# Cookies: paste a Netscape-format cookies.txt via the URL panel's Cookies
# section. Saved to <data_dir>/url_cookies.txt mode 0600 — not configurable
# in TOML by design.
